name: Build APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - uses: android-actions/setup-android@v3

    - name: Prepare assets & keystore
      run: |
        mkdir -p android-studio-project/app/src/main/assets
        cp index.html android-studio-project/app/src/main/assets/
        cp manifest.json android-studio-project/app/src/main/assets/ 2>/dev/null || true
        cp sw.js android-studio-project/app/src/main/assets/ 2>/dev/null || true
        if [ -d icons ]; then cp -r icons android-studio-project/app/src/main/assets/; fi

        mkdir -p android-studio-project/app/src/main/res/mipmap-mdpi
        mkdir -p android-studio-project/app/src/main/res/mipmap-hdpi
        mkdir -p android-studio-project/app/src/main/res/mipmap-xhdpi
        mkdir -p android-studio-project/app/src/main/res/mipmap-xxhdpi
        
        if [ -f icons/icon-192.png ]; then
          cp icons/icon-192.png android-studio-project/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icons/icon-192.png android-studio-project/app/src/main/res/mipmap-hdpi/ic_launcher.png
        fi
        if [ -f icons/icon-512.png ]; then
          cp icons/icon-512.png android-studio-project/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icons/icon-512.png android-studio-project/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        fi

        keytool -genkey -v \
          -keystore android-studio-project/release.keystore \
          -alias benchmark \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass benchmark123 -keypass benchmark123 \
          -dname "CN=Benchmark, OU=Dev, O=Benchmark, L=BR, ST=BR, C=BR"

    - name: Build APK
      working-directory: ./android-studio-project
      run: gradle wrapper --gradle-version 8.10.2 && ./gradlew assembleRelease --no-daemon

    - name: Copy APK
      run: |
        find android-studio-project -name "*.apk" -exec cp {} release.apk \;
        ls -la release.apk

    - uses: actions/upload-artifact@v4
      with:
        name: benchmark-apk
        path: release.apk

    - name: Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
