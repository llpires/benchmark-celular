plugins {
    id 'com.android.application'
}
android {
    namespace 'com.benchmark.celular'
    compileSdk 34
    defaultConfig {
        applicationId "com.benchmark.celular"
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "1.0.1"
    }
    signingConfigs {
        release {
            storeFile file("../release.keystore")
            storePassword "benchmark123"
            keyAlias "benchmark"
            keyPassword "benchmark123"
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
